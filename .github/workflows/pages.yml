name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Inject last-updated date
        run: |
          DATE=$(git log -1 --format=%cd --date=format:'%d/%m/%Y' -- www/)
          sed -i "s|__LAST_UPDATED__|$DATE|" www/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: www
      - id: deployment
        uses: actions/deploy-pages@v4
