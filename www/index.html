<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Numpy &amp; Pandas — Aide-mémoire</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600&family=IBM+Plex+Sans:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #F5F7FB;
    --sidebar-bg: #0E1420;
    --sidebar-hover: #182136;
    --sidebar-active: #1D2A47;
    --sidebar-text: #8B96AC;
    --sidebar-text-active: #F5F7FB;
    --ink: #172033;
    --muted: #6B7686;
    --line: #E1E5EE;
    --numpy: #3D6EFF;
    --pandas: #E8993D;
    --pieges: #D2483F;
    --code-tint: #EEF2FF;
    --result-tint: #FFF6EA;
    --font-display: 'Space Grotesk', sans-serif;
    --font-body: 'IBM Plex Sans', sans-serif;
    --font-mono: 'IBM Plex Mono', monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:var(--font-body);
    background:var(--bg);
    color:var(--ink);
    display:flex;
    min-height:100vh;
  }

  /* ---------- SIDEBAR ---------- */
  #sidebar{
    width:280px;
    flex-shrink:0;
    background:var(--sidebar-bg);
    height:100vh;
    position:sticky;
    top:0;
    overflow-y:auto;
    padding:28px 0 40px;
  }
  #sidebar .brand{
    padding:0 24px 20px;
    border-bottom:1px solid rgba(255,255,255,0.08);
    margin-bottom:12px;
  }
  #sidebar .brand h1{
    font-family:var(--font-display);
    font-size:17px;
    font-weight:600;
    color:#fff;
    margin:0 0 4px;
    letter-spacing:-0.01em;
  }
  #sidebar .brand p{
    font-family:var(--font-mono);
    font-size:11.5px;
    color:var(--sidebar-text);
    margin:0;
  }
  .nav-group{margin-top:22px;}
  .nav-group-label{
    font-family:var(--font-mono);
    font-size:11px;
    letter-spacing:0.12em;
    padding:0 24px 8px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .nav-group-label .dot{
    width:7px;height:7px;border-radius:50%;
    display:inline-block;
  }
  .nav-group-label.numpy{color:#9DB4FF;}
  .nav-group-label.numpy .dot{background:var(--numpy);}
  .nav-group-label.pandas{color:#F4C583;}
  .nav-group-label.pandas .dot{background:var(--pandas);}
  .nav-group-label.pieges{color:#F0A29C;}
  .nav-group-label.pieges .dot{background:var(--pieges);}

  .nav-item{
    display:flex;
    align-items:baseline;
    gap:10px;
    width:100%;
    padding:9px 24px;
    background:none;
    border:none;
    border-left:3px solid transparent;
    text-align:left;
    color:var(--sidebar-text);
    font-family:var(--font-body);
    font-size:13.5px;
    cursor:pointer;
    transition:background 0.12s ease, color 0.12s ease;
  }
  .nav-item .idx{
    font-family:var(--font-mono);
    font-size:11.5px;
    color:rgba(255,255,255,0.28);
    flex-shrink:0;
  }
  .nav-item:hover{background:var(--sidebar-hover); color:#D5DBE8;}
  .nav-item.active{
    background:var(--sidebar-active);
    color:var(--sidebar-text-active);
  }
  .nav-item.active.numpy{border-left-color:var(--numpy);}
  .nav-item.active.pandas{border-left-color:var(--pandas);}
  .nav-item.active.pieges{border-left-color:var(--pieges);}
  .nav-item.active .idx{color:inherit; opacity:0.55;}

  /* ---------- MAIN ---------- */
  #main{
    flex:1;
    min-width:0;
    padding:44px 56px 80px;
    max-width:960px;
  }
  .panel{display:none;}
  .panel.active{display:block;}

  .panel-header{
    margin-bottom:26px;
  }
  .panel-eyebrow{
    font-family:var(--font-mono);
    font-size:11.5px;
    letter-spacing:0.1em;
    display:flex;
    align-items:center;
    gap:8px;
    margin-bottom:8px;
  }
  .panel-eyebrow .dot{width:7px;height:7px;border-radius:50%;display:inline-block;}
  .panel-eyebrow.numpy{color:#3D6EFF;}
  .panel-eyebrow.numpy .dot{background:var(--numpy);}
  .panel-eyebrow.pandas{color:#B96F13;}
  .panel-eyebrow.pandas .dot{background:var(--pandas);}
  .panel-eyebrow.pieges{color:#B23A2F;}
  .panel-eyebrow.pieges .dot{background:var(--pieges);}

  .panel-header h2{
    font-family:var(--font-display);
    font-size:26px;
    font-weight:600;
    margin:0;
    letter-spacing:-0.01em;
  }

  table{
    width:100%;
    border-collapse:collapse;
    background:#fff;
    border:1px solid var(--line);
    border-radius:10px;
    overflow:hidden;
  }
  thead th{
    text-align:left;
    font-family:var(--font-mono);
    font-size:11px;
    letter-spacing:0.08em;
    color:var(--muted);
    font-weight:500;
    padding:12px 18px;
    border-bottom:1px solid var(--line);
    background:#FAFBFD;
  }
  tbody td{
    padding:14px 18px;
    border-bottom:1px solid var(--line);
    font-size:13.5px;
    vertical-align:top;
    line-height:1.55;
  }
  tbody tr:last-child td{border-bottom:none;}
  td.col-objectif{color:var(--ink); width:26%;}
  td.col-syntaxe{
    background:var(--code-tint);
    font-family:var(--font-mono);
    font-size:12.5px;
    color:#1F2A5C;
    width:42%;
  }
  td.col-syntaxe code{white-space:pre-wrap; display:block;}
  .broken-code{
    display:block;
    color:#9AA3B5;
    text-decoration:line-through;
    text-decoration-color:#C94A4A;
    margin-bottom:6px;
    font-size:12.5px;
  }
  .mini-label{
    font-family:var(--font-body);
    font-size:11px;
    color:inherit;
    opacity:0.7;
    margin:8px 0 3px;
  }
  .mini-table{
    background:#fff;
    border:1px solid rgba(31,42,92,0.15);
    border-radius:6px;
    padding:8px 10px;
    margin-bottom:8px;
    white-space:pre-wrap;
    font-size:12px;
    color:#1F2A5C;
  }
  td.col-resultat{
    background:var(--result-tint);
    color:#5C3F14;
    width:32%;
    white-space:pre-wrap;
    font-family:var(--font-mono);
    font-size:12px;
  }
  .compat-note{
    margin-top:8px;
    padding-top:8px;
    border-top:1px dashed rgba(31,42,92,0.25);
    font-family:var(--font-body);
    font-size:11.5px;
    line-height:1.5;
    color:#8A5A12;
  }
  .compat-note b{font-weight:500; color:#5C3F14;}

  /* mobile */
  @media (max-width:820px){
    body{flex-direction:column;}
    #sidebar{
      width:100%;
      height:auto;
      position:relative;
      padding:16px 0;
    }
    #sidebar .brand{padding:0 16px 14px;}
    .nav-group{margin-top:14px;}
    #main{padding:28px 18px 60px; max-width:100%;}
    table, thead, tbody, th, td, tr{display:block;}
    thead{display:none;}
    tbody tr{
      border-bottom:1px solid var(--line);
      padding:12px 0;
    }
    tbody tr:last-child{border-bottom:none;}
    td{border-bottom:none !important; padding:6px 16px !important; width:auto !important;}
    td.col-objectif{font-weight:500;}
    td::before{
      content:attr(data-label);
      display:block;
      font-family:var(--font-mono);
      font-size:10px;
      letter-spacing:0.08em;
      color:var(--muted);
      margin-bottom:3px;
    }
  }
</style>
</head>

];

const groupLabels = {numpy:"Numpy", pandas:"Pandas", pieges:"Pièges"};
const navGroupsEl = document.getElementById('nav-groups');
const mainEl = document.getElementById('main');

let currentGroup = null;
let groupWrapper = null;

sections.forEach((sec, i) => {
  if (sec.group !== currentGroup){
    currentGroup = sec.group;
    groupWrapper = document.createElement('div');
    groupWrapper.className = 'nav-group';
    const label = document.createElement('div');
    label.className = 'nav-group-label ' + sec.group;
    label.innerHTML = '<span class="dot"></span>' + groupLabels[sec.group];
    groupWrapper.appendChild(label);
    navGroupsEl.appendChild(groupWrapper);
  }
  const btn = document.createElement('button');
  btn.className = 'nav-item ' + sec.group;
  btn.dataset.target = sec.id;
  const idxSpan = document.createElement('span');
  idxSpan.className = 'idx';
  idxSpan.textContent = String(i).padStart(2,'0');
  const titleSpan = document.createElement('span');
  titleSpan.textContent = sec.title;
  btn.appendChild(idxSpan);
  btn.appendChild(titleSpan);
  btn.addEventListener('click', () => showSection(sec.id));
  groupWrapper.appendChild(btn);

  const panel = document.createElement('section');
  panel.className = 'panel';
  panel.id = 'panel-' + sec.id;

  const header = document.createElement('div');
  header.className = 'panel-header';
  const eyebrow = document.createElement('div');
  eyebrow.className = 'panel-eyebrow ' + sec.group;
  eyebrow.innerHTML = '<span class="dot"></span>' + groupLabels[sec.group] + ' · section ' + String(i).padStart(2,'0');
  const h2 = document.createElement('h2');
  h2.textContent = sec.title;
  header.appendChild(eyebrow);
  header.appendChild(h2);
  panel.appendChild(header);

  const table = document.createElement('table');
  const thead = document.createElement('thead');
  const [h1, h2label, h3] = sec.headers || ["Objectif", "Syntaxe", "Résultat"];
  thead.innerHTML = '<tr><th>' + h1 + '</th><th>' + h2label + '</th><th>' + h3 + '</th></tr>';
  const tbody = document.createElement('tbody');

  function renderContent(container, content){
    if (Array.isArray(content)){
      content.forEach(seg => {
        if (seg.code !== undefined){
          const code = document.createElement('code');
          code.textContent = seg.code;
          container.appendChild(code);
        } else if (seg.table !== undefined){
          const tableBlock = document.createElement('div');
          tableBlock.className = 'mini-table';
          tableBlock.textContent = seg.table;
          container.appendChild(tableBlock);
        } else if (seg.label !== undefined){
          const label = document.createElement('div');
          label.className = 'mini-label';
          label.textContent = seg.label;
          container.appendChild(label);
        }
      });
    } else if (container.classList.contains('col-syntaxe')) {
      const code = document.createElement('code');
      code.textContent = content;
      container.appendChild(code);
    } else {
      container.textContent = content;
    }
  }

  sec.rows.forEach((row) => {
    const [objectif, syntaxe, resultat, broken] = row;
    const tr = document.createElement('tr');

    const tdObj = document.createElement('td');
    tdObj.className = 'col-objectif';
    tdObj.dataset.label = h1;
    tdObj.textContent = objectif;

    const tdSyn = document.createElement('td');
    tdSyn.className = 'col-syntaxe';
    tdSyn.dataset.label = h2label;
    if (broken){
      const brokenCode = document.createElement('code');
      brokenCode.className = 'broken-code';
      brokenCode.textContent = broken;
      tdSyn.appendChild(brokenCode);
    }
    renderContent(tdSyn, syntaxe);

    const tdRes = document.createElement('td');
    tdRes.className = 'col-resultat';
    tdRes.dataset.label = h3;
    renderContent(tdRes, resultat);

    tr.appendChild(tdObj);
    tr.appendChild(tdSyn);
    tr.appendChild(tdRes);
    tbody.appendChild(tr);
  });
  table.appendChild(thead);
  table.appendChild(tbody);
  panel.appendChild(table);
  mainEl.appendChild(panel);
});

function showSection(id){
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.target === id);
  });
  document.querySelectorAll('.panel').forEach(el => {
    el.classList.toggle('active', el.id === 'panel-' + id);
  });
  window.location.hash = id;
  mainEl.scrollTo(0,0);
  window.scrollTo(0,0);
}

const initial = window.location.hash ? window.location.hash.slice(1) : sections[0].id;
showSection(sections.some(s => s.id === initial) ? initial : sections[0].id);
</script>

</body>
</html>
