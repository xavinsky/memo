<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Science — Aide-mémoire</title>
<script>
(function(){
  var z = parseFloat(localStorage.getItem("memo-zoom"));
  if (!z || isNaN(z)) z = 1;
  document.documentElement.style.zoom = z;
})();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600&family=IBM+Plex+Sans:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<style>
  :root{
    --bg: #F5F7FB;
    --sidebar-bg: #0E1420;
    --sidebar-hover: #182136;
    --sidebar-active: #1D2A47;
    --sidebar-text: #8B96AC;
    --sidebar-text-active: #F5F7FB;
    --ink: #172033;
    --muted: #6B7686;
    --line: #E1E5EE;
    --numpy: #3D6EFF;
    --pandas: #E8993D;
    --math: #2E9E6D;
    --plot: #7C5CFC;
    --stats: #1F9FBF;
    --regression: #D9455F;
    --dash: #C2478A;
    --ml: #CC9A1F;
    --code-tint: #EEF2FF;
    --result-tint: #FFF6EA;
    --font-display: 'Space Grotesk', sans-serif;
    --font-body: 'IBM Plex Sans', sans-serif;
    --font-mono: 'IBM Plex Mono', monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:var(--font-body);
    background:var(--bg);
    color:var(--ink);
    display:flex;
    min-height:100vh;
  }

  /* ---------- SIDEBAR ---------- */
  #sidebar{
    width:280px;
    flex-shrink:0;
    background:var(--sidebar-bg);
    height:100vh;
    position:sticky;
    top:0;
    overflow-y:auto;
    padding:28px 0 40px;
  }
  #sidebar .brand{
    padding:0 24px 20px;
    border-bottom:1px solid rgba(255,255,255,0.08);
    margin-bottom:12px;
  }
  #sidebar .brand h1{
    font-family:var(--font-display);
    font-size:17px;
    font-weight:600;
    color:#fff;
    margin:0 0 4px;
    letter-spacing:-0.01em;
  }
  #sidebar .brand p{
    font-family:var(--font-mono);
    font-size:11.5px;
    color:var(--sidebar-text);
    margin:0;
  }
  #sidebar .brand a{
    display:inline-block;
    margin-top:10px;
    font-family:var(--font-mono);
    font-size:11.5px;
    color:#9DB4FF;
    text-decoration:none;
  }
  #sidebar .brand a:hover{text-decoration:underline;}
  .zoom-controls{
    display:flex;
    align-items:center;
    gap:8px;
    margin-top:14px;
  }
  .zoom-controls button{
    width:24px;
    height:24px;
    border-radius:6px;
    border:1px solid rgba(255,255,255,0.14);
    background:var(--sidebar-hover);
    color:var(--sidebar-text-active);
    font-family:var(--font-mono);
    font-size:14px;
    line-height:1;
    cursor:pointer;
  }
  .zoom-controls button:hover{background:var(--sidebar-active);}
  .zoom-controls #zoom-level{
    font-family:var(--font-mono);
    font-size:11px;
    color:var(--sidebar-text);
    min-width:34px;
    text-align:center;
  }
  .search-box{margin-top:14px;}
  .search-box input{
    width:100%;
    box-sizing:border-box;
    background:var(--sidebar-hover);
    border:1px solid rgba(255,255,255,0.14);
    color:var(--sidebar-text-active);
    border-radius:6px;
    padding:7px 9px;
    font-family:var(--font-mono);
    font-size:12px;
    outline:none;
  }
  .search-box input::placeholder{color:var(--sidebar-text);}
  .search-box input:focus{border-color:#9DB4FF;}
  .search-nav{
    display:flex;
    align-items:center;
    gap:8px;
    margin-top:8px;
  }
  .search-nav button{
    width:24px;
    height:24px;
    border-radius:6px;
    border:1px solid rgba(255,255,255,0.14);
    background:var(--sidebar-hover);
    color:var(--sidebar-text-active);
    font-size:13px;
    line-height:1;
    cursor:pointer;
  }
  .search-nav button:hover{background:var(--sidebar-active);}
  .search-nav button:disabled{opacity:0.35; cursor:default;}
  .search-nav #search-count{
    font-family:var(--font-mono);
    font-size:11px;
    color:var(--sidebar-text);
    min-width:42px;
    text-align:center;
  }
  mark.search-mark{background:#FFE58A; color:inherit; border-radius:2px; padding:0 1px;}
  mark.search-mark.current{background:#FFB020; box-shadow:0 0 0 2px rgba(255,176,32,0.5);}
  #nav-groups{padding-bottom:50px;}
  .sidebar-footer{
    position:fixed;
    left:0; bottom:0;
    width:280px;
    box-sizing:border-box;
    padding:10px 24px;
    background:var(--sidebar-bg);
    border-top:1px solid rgba(255,255,255,0.08);
    font-family:var(--font-mono);
    font-size:11px;
    color:var(--sidebar-text);
  }
  .nav-group{margin-top:22px;}
  .nav-group-label{
    font-family:var(--font-mono);
    font-size:11px;
    letter-spacing:0.12em;
    text-transform:uppercase;
    padding:0 24px 8px;
    display:flex;
    align-items:center;
    gap:8px;
    cursor:pointer;
    user-select:none;
  }
  .nav-group-label .dot{
    width:7px;height:7px;border-radius:50%;
    display:inline-block;
  }
  .nav-group-label .label-text{flex:1;}
  .nav-group-label .chevron{
    font-size:10px;
    opacity:0.5;
    transition:transform 0.15s ease;
    transform:rotate(0deg);
  }
  .nav-group.collapsed .nav-group-label .chevron{transform:rotate(-90deg);}
  .nav-group-items{
    overflow:hidden;
  }
  .nav-group.collapsed .nav-group-items{display:none;}
  .nav-group-label.numpy{color:#9DB4FF;}
  .nav-group-label.numpy .dot{background:var(--numpy);}
  .nav-group-label.pandas{color:#F4C583;}
  .nav-group-label.pandas .dot{background:var(--pandas);}
  .nav-group-label.math{color:#8DE0BE;}
  .nav-group-label.math .dot{background:var(--math);}
  .nav-group-label.plot{color:#C9BBFF;}
  .nav-group-label.plot .dot{background:var(--plot);}
  .nav-group-label.stats{color:#9FE0EE;}
  .nav-group-label.stats .dot{background:var(--stats);}
  .nav-group-label.regression{color:#FFB3C6;}
  .nav-group-label.regression .dot{background:var(--regression);}
  .nav-group-label.dash{color:#EBA8CF;}
  .nav-group-label.dash .dot{background:var(--dash);}
  .nav-group-label.ml{color:#F0CF6B;}
  .nav-group-label.ml .dot{background:var(--ml);}

  .nav-subgroup{margin-top:2px;}
  .nav-subgroup-label{
    font-family:var(--font-mono);
    font-size:10.5px;
    letter-spacing:0.09em;
    text-transform:lowercase;
    color:#B7C0D6;
    padding:10px 24px 8px 20px;
    display:flex;
    align-items:center;
    gap:6px;
    cursor:pointer;
    user-select:none;
  }
  .nav-subgroup-label:hover{opacity:0.8;}
  .nav-subgroup-label .label-text{flex:1;}
  .nav-subgroup-label.numpy{color:#9DB4FF;}
  .nav-subgroup-label.pandas{color:#F4C583;}
  .nav-subgroup-label.math{color:#8DE0BE;}
  .nav-subgroup-label.plot{color:#C9BBFF;}
  .nav-subgroup-label.stats{color:#9FE0EE;}
  .nav-subgroup-label.regression{color:#FFB3C6;}
  .nav-subgroup-label.dash{color:#EBA8CF;}
  .nav-subgroup-label.ml{color:#F0CF6B;}
  .nav-subgroup-label .chevron{
    font-size:9px;
    opacity:0.6;
    transition:transform 0.15s ease;
    transform:rotate(0deg);
  }
  .nav-subgroup.collapsed .nav-subgroup-label .chevron{transform:rotate(-90deg);}
  .nav-subgroup-items{overflow:hidden;}
  .nav-subgroup.collapsed .nav-subgroup-items{display:none;}
  .nav-subgroup-items .nav-item{padding-left:34px;}

  .nav-item{
    display:flex;
    align-items:baseline;
    gap:10px;
    width:100%;
    padding:9px 24px;
    background:none;
    border:none;
    border-left:3px solid transparent;
    text-align:left;
    color:var(--sidebar-text);
    font-family:var(--font-body);
    font-size:13.5px;
    cursor:pointer;
    transition:background 0.12s ease, color 0.12s ease;
  }
  .nav-item:hover{background:var(--sidebar-hover); color:#D5DBE8;}
  .nav-item.active{
    background:var(--sidebar-active);
    color:var(--sidebar-text-active);
  }
  .nav-item.active.numpy{border-left-color:var(--numpy);}
  .nav-item.active.pandas{border-left-color:var(--pandas);}
  .nav-item.active.math{border-left-color:var(--math);}
  .nav-item.active.plot{border-left-color:var(--plot);}
  .nav-item.active.stats{border-left-color:var(--stats);}
  .nav-item.active.regression{border-left-color:var(--regression);}
  .nav-item.active.dash{border-left-color:var(--dash);}
  .nav-item.active.ml{border-left-color:var(--ml);}

  /* ---------- MAIN ---------- */
  #main{
    flex:1;
    min-width:0;
    padding:44px 56px 80px;
    max-width:960px;
  }
  .panel{display:none;}
  .panel.active{display:block;}

  .panel-header{
    margin-bottom:26px;
  }
  .panel-eyebrow{
    font-family:var(--font-mono);
    font-size:11.5px;
    letter-spacing:0.1em;
    display:flex;
    align-items:center;
    gap:8px;
    margin-bottom:8px;
  }
  .panel-eyebrow .dot{width:7px;height:7px;border-radius:50%;display:inline-block;}
  .panel-eyebrow.numpy{color:#3D6EFF;}
  .panel-eyebrow.numpy .dot{background:var(--numpy);}
  .panel-eyebrow.pandas{color:#B96F13;}
  .panel-eyebrow.pandas .dot{background:var(--pandas);}
  .panel-eyebrow.math{color:#1F7A54;}
  .panel-eyebrow.math .dot{background:var(--math);}
  .panel-eyebrow.plot{color:#5B3FCB;}
  .panel-eyebrow.plot .dot{background:var(--plot);}
  .panel-eyebrow.stats{color:#15748C;}
  .panel-eyebrow.stats .dot{background:var(--stats);}
  .panel-eyebrow.regression{color:#B23A55;}
  .panel-eyebrow.regression .dot{background:var(--regression);}
  .panel-eyebrow.dash{color:#9C2F6E;}
  .panel-eyebrow.dash .dot{background:var(--dash);}
  .panel-eyebrow.ml{color:#8F6B10;}
  .panel-eyebrow.ml .dot{background:var(--ml);}

  .panel-header h2{
    font-family:var(--font-display);
    font-size:26px;
    font-weight:600;
    margin:0;
    letter-spacing:-0.01em;
  }

  table{
    width:100%;
    border-collapse:collapse;
    background:#fff;
    border:1px solid var(--line);
    border-radius:10px;
    overflow:hidden;
  }
  thead th{
    text-align:left;
    font-family:var(--font-mono);
    font-size:11px;
    letter-spacing:0.08em;
    color:var(--muted);
    font-weight:500;
    padding:12px 18px;
    border-bottom:1px solid var(--line);
    background:#FAFBFD;
  }
  tbody td{
    padding:14px 18px;
    border-bottom:1px solid var(--line);
    font-size:13.5px;
    vertical-align:top;
    line-height:1.55;
  }
  tbody tr:last-child td{border-bottom:none;}
  td.col-objectif{color:var(--ink); width:26%;}
  td.col-syntaxe{
    background:var(--code-tint);
    font-family:var(--font-mono);
    font-size:12.5px;
    color:#1F2A5C;
    width:42%;
  }
  td.col-syntaxe code{white-space:pre-wrap; display:block;}
  td.col-syntaxe code strong, .broken-code strong{
    background:#BFDBFE;
    padding:0 3px;
    border-radius:3px;
    font-weight:700;
  }
  .broken-code{
    display:block;
    color:#9AA3B5;
    text-decoration:line-through;
    text-decoration-color:#C94A4A;
    margin-bottom:6px;
    font-size:12.5px;
  }
  .mini-label{
    font-family:var(--font-body);
    font-size:11px;
    color:inherit;
    opacity:0.7;
    margin:8px 0 3px;
  }
  .mini-table{
    background:#fff;
    border:1px solid rgba(31,42,92,0.15);
    border-radius:6px;
    padding:8px 10px;
    margin-bottom:8px;
    white-space:pre-wrap;
    font-size:12px;
    color:#1F2A5C;
  }
  td.col-resultat{
    background:var(--result-tint);
    color:#5C3F14;
    width:32%;
    white-space:pre-wrap;
    font-family:var(--font-mono);
    font-size:12px;
  }
  td.col-nom{color:var(--ink); width:20%;}
  td.col-formule{
    background:var(--code-tint);
    font-family:var(--font-mono);
    font-size:12.5px;
    color:#1F2A5C;
    width:32%;
    white-space:pre-wrap;
  }
  td.col-formule code{white-space:pre-wrap; display:block;}
  td.col-formule strong{
    background:#BFDBFE;
    padding:0 3px;
    border-radius:3px;
    font-weight:700;
  }
  td.col-params{
    background:#EAF7F0;
    color:#1F6B4A;
    width:24%;
    font-family:var(--font-mono);
    font-size:12px;
  }
  .param-line{
    line-height:1.5;
    margin-bottom:8px;
  }
  .param-line:last-child{margin-bottom:0;}
  td.col-explication{
    background:var(--result-tint);
    color:#5C3F14;
    width:24%;
    white-space:pre-wrap;
    font-family:var(--font-mono);
    font-size:12px;
  }
  td .katex-display{
    margin:6px 0;
    overflow-x:auto;
    overflow-y:hidden;
  }
  td.col-formule .katex-display{
    background:#fff;
    border:1px solid rgba(31,42,92,0.12);
    border-radius:6px;
    padding:8px 10px;
    margin:0 0 8px;
  }
  td.col-formule .katex{
    background:#fff;
    border:1px solid rgba(31,42,92,0.12);
    border-radius:5px;
    padding:2px 6px;
    display:inline-block;
    margin-bottom:6px;
  }
  td.col-formule .katex-display .katex{
    background:none;
    border:none;
    padding:0;
    margin:0;
    display:inline;
  }
  td.col-params .katex{
    background:#fff;
    border:1px solid rgba(31,111,74,0.2);
    border-radius:4px;
    padding:0px 5px;
    display:inline-block;
  }
  .compat-note{
    margin-top:8px;
    padding-top:8px;
    border-top:1px dashed rgba(31,42,92,0.25);
    font-family:var(--font-body);
    font-size:11.5px;
    line-height:1.5;
    color:#8A5A12;
  }
  .compat-note b{font-weight:500; color:#5C3F14;}

  /* mobile */
  @media (max-width:820px){
    body{flex-direction:column;}
    #sidebar{
      width:100%;
      height:auto;
      position:relative;
      padding:16px 0;
    }
    #sidebar .brand{padding:0 16px 14px;}
    .sidebar-footer{position:static; width:100%; margin-top:14px;}
    #nav-groups{padding-bottom:0;}
    .nav-group{margin-top:14px;}
    #main{padding:28px 18px 60px; max-width:100%;}
    table, thead, tbody, th, td, tr{display:block;}
    thead{display:none;}
    tbody tr{
      border-bottom:1px solid var(--line);
      padding:12px 0;
    }
    tbody tr:last-child{border-bottom:none;}
    td{border-bottom:none !important; padding:6px 16px !important; width:auto !important;}
    td.col-objectif{font-weight:500;}
    td.col-nom{font-weight:500;}
    td::before{
      content:attr(data-label);
      display:block;
      font-family:var(--font-mono);
      font-size:10px;
      letter-spacing:0.08em;
      color:var(--muted);
      margin-bottom:3px;
    }
  }
</style>
</head>
<body>

<nav id="sidebar">
  <div class="brand">
    <h1>Data Science</h1>
    <p>aide-mémoire par cas d'usage</p>
    <a href="references.html">Références &amp; liens →</a>
    <div class="zoom-controls">
      <button id="zoom-out" type="button" aria-label="Réduire le zoom">−</button>
      <span id="zoom-level">100%</span>
      <button id="zoom-in" type="button" aria-label="Augmenter le zoom">+</button>
    </div>
    <div class="search-box">
      <input type="text" id="search-input" placeholder="Rechercher… ( / )" autocomplete="off">

<main id="main"></main>

<script>
const ZOOM_KEY = "memo-zoom", ZOOM_MIN = 0.8, ZOOM_MAX = 1.6, ZOOM_STEP = 0.1;
function applyZoom(z){
  z = Math.round(Math.min(ZOOM_MAX, Math.max(ZOOM_MIN, z)) * 100) / 100;
  document.documentElement.style.zoom = z;
  localStorage.setItem(ZOOM_KEY, z);
  document.getElementById("zoom-level").textContent = Math.round(z * 100) + "%";
}
document.getElementById("zoom-out").addEventListener("click", () => {
  applyZoom((parseFloat(document.documentElement.style.zoom) || 1) - ZOOM_STEP);
});
document.getElementById("zoom-in").addEventListener("click", () => {
  applyZoom((parseFloat(document.documentElement.style.zoom) || 1) + ZOOM_STEP);
});
applyZoom(parseFloat(document.documentElement.style.zoom) || 1);

const sections = [
  {id:"creation", group:"numpy", title:"Création de tableaux", rows:[
    ["Créer un tableau à partir d'une liste","**np.array**([1, 2, 3])","array([1, 2, 3])"],
    ["Tableau de zéros","**np.zeros**((3, 4))","matrice 3x4 remplie de 0"],
    ["Tableau de uns","**np.ones**((2, 2))","matrice 2x2 remplie de 1"],
    ["Matrice identité","**np.eye**(3)","matrice 3x3 avec des 1 sur la diagonale, 0 ailleurs"],
    ["Suite régulière (début, fin, pas)","**np.arange**(0, 10, 2)","array([0, 2, 4, 6, 8])"],
    ["N valeurs régulières entre deux bornes","**np.linspace**(0, 1, 5)","array([0., 0.25, 0.5, 0.75, 1.])"],
    ["Tableau aléatoire uniforme [0,1)","**np.random.rand**(3, 3)","matrice 3x3 de floats aléatoires"],
    ["Tableau d'entiers aléatoires","**np.random.randint**(0, 10, size=(2, 3))","matrice 2x3 d'entiers entre 0 et 9"],
  ]},
  {id:"attributs-numpy", group:"numpy", title:"Attributs d'un tableau (ndim, shape, size, dtype)", rows:[
    ["Nombre de dimensions","a.**ndim**","int — 1 pour un vecteur, 2 pour une matrice, etc."],
    ["Forme (dimensions) du tableau","a.**shape**","tuple — (lignes, colonnes) pour un tableau 2D"],
    ["Nombre total d'éléments","a.**size**","int — produit de toutes les dimensions de shape"],
    ["Type des éléments","a.**dtype**","ex: int64, float64 — tous les éléments d'un ndarray ont le même type, contrairement à une liste Python"],
    ["Reconvertir en liste Python native","a.**tolist**()","list (ou liste de listes) — utile pour interopérer avec du code qui attend des listes plutôt que des ndarray"],
  ]},
  {id:"indexation", group:"numpy", title:"Indexation et masques", rows:[
    ["Élément précis (ligne, colonne)","a**[1, 2]**","valeur unique à la position [1,2]"],
    ["Une ligne entière","a**[1]**","tableau 1D, la ligne d'index 1"],
    ["Une colonne entière","a**[:, 0]**","tableau 1D, la colonne d'index 0"],
    ["Sous-matrice (plage de lignes et colonnes)","a**[1:3, 0:2]**","matrice 2x2 extraite"],
    ["Toutes les lignes, colonnes choisies","a[:, **[0, 2]**]","colonnes 0 et 2 pour toutes les lignes"],
    ["Un axe entier avec un pas","a[**::2**, **::2**]","1 ligne sur 2, 1 colonne sur 2"],
    ["Inverser l'ordre d'un axe","a[**::-1**]","lignes dans l'ordre inverse"],
    ["Filtrer par condition","a[**a > 5**]","tableau 1D des éléments > 5"],
    ["Combiner plusieurs conditions","a[(a > 2) **&** (a < 8)]","éléments entre 2 et 8 (exclus)"],
    ["Remplacer selon condition","**np.where**(a > 5, 1, 0)","1 si > 5, sinon 0"],
    ["Remplacer en place tous les éléments vérifiant une condition","a[**a > 4**] = 99","modifie a directement (contrairement à np.where qui renvoie un nouveau tableau sans toucher a)"],
  ]},
  {id:"reshape-tri", group:"numpy", title:"Forme et tri des tableaux", rows:[
    ["Changer la forme d'un tableau","a.**reshape**(3, 4)","même données, forme 3x4"],
    ["Aplatir un tableau","a.**flatten**()","tableau 1D"],
    ["Transposer","a.**T**","lignes/colonnes inversées"],
    ["Trier un tableau (nouvelle copie)","**np.sort**(a)","tableau trié croissant, a n'est pas modifié"],
    ["Trier un tableau sur place","a.**sort**()","modifie a directement, ne renvoie rien"],
    ["Indices qui donneraient le tableau trié","**np.argsort**(a)","tableau des positions, dans l'ordre de tri"],

  {id:"index-comprendre", group:"pandas", subgroup:"Index", title:"Comprendre l'index", rows:[

  {id:"index-set-reset", group:"pandas", subgroup:"Index", title:"Définir / réinitialiser l'index", rows:[

  {id:"selection", group:"pandas", subgroup:"Sélection, filtrage & tri", title:"Sélection", rows:[
    ["Sélectionner une colonne","df**[\"col\"]**","Series"],
    ["Sélectionner une colonne — notation par point (raccourci)","df.**col**","Series — équivalent à df[\"col\"], mais seulement si \"col\" est un identifiant Python valide (pas d'espace, ne commence pas par un chiffre) et ne rentre pas en conflit avec une méthode/attribut existant de DataFrame (ex: df.count, df.shape) ; ne fonctionne pas pour créer une nouvelle colonne par assignation (df.nouvelle_col = ... échoue, il faut df[\"nouvelle_col\"] = ...)"],
    ["Sélectionner plusieurs colonnes","df**[[\"col1\", \"col2\"]]**","DataFrame"],

    ["Plage de lignes par label (bornes incluses des deux côtés)","df.**loc**[3:7]","lignes dont le label d'index va de 3 à 7 INCLUS — contrairement à .iloc[3:7] (borne de fin exclue), .loc inclut la borne de fin"],
  ]},
  {id:"tri", group:"pandas", subgroup:"Sélection, filtrage & tri", title:"Tri", rows:[
    ["Trier par une colonne","df.**sort_values**(\"col\", ascending=False)","DataFrame trié décroissant"],
    ["Trier par plusieurs colonnes","df.**sort_values**([\"col1\",\"col2\"], ascending=[True, False])","DataFrame trié selon priorités"],
    ["Piège : le tri ne réordonne pas l'index","df.**sort_values**(\"col\")","les lignes changent de position mais gardent leur label d'origine — l'index n'est plus dans l'ordre 0,1,2... ; ajouter .reset_index(drop=True) si on veut un index propre après tri"],
  ]},
  {id:"filtrage", group:"pandas", subgroup:"Sélection, filtrage & tri", title:"Filtrage", rows:[
    ["Opérateurs autorisés dans une condition",[
      {table:"==   égal à\n!=   différent de\n>    strictement supérieur\n>=   supérieur ou égal\n<    strictement inférieur\n<=   inférieur ou égal\n&    ET logique\n|    OU logique\n~    négation (NON)"}
    ],"chaque condition entre parenthèses, avec & | ~ — jamais and / or / not (ne fonctionnent pas sur une Series)"],
    ["Filtrer sur une condition","df**[df[\"col\"] > 10]**","lignes où col > 10"],
    ["Filtrer avec ET","df[(df[\"col1\"] > 10) **&** (df[\"col2\"] == \"A\")]","lignes vérifiant les deux conditions"],
    ["Filtrer avec OU","df[(df[\"col1\"] > 10) **|** (df[\"col2\"] == \"A\")]","lignes vérifiant au moins une condition"],
    ["Filtrer sur une liste de valeurs","df[df[\"col\"].**isin**([\"A\", \"B\"])]","lignes où col vaut A ou B"],
    ["Exclure une liste de valeurs","df[**~**df[\"col\"].isin([\"A\", \"B\"])]","lignes où col n'est ni A ni B"],
    ["Filtrer un Index (mêmes opérateurs qu'une Series)","serie.index[~serie.index.**isin**(liste_complete)]","clés de serie.index absentes de liste_complete — ex: repérer les orphelins avant un reindex()"],
    ["Filtrer sur un texte contenu","df[df[\"col\"].str.**contains**(\"texte\", na=False)]","lignes contenant \"texte\""],
    ["Filtrer en syntaxe lisible","df.**query**(\"col1 > 10 and col2 == 'A'\")","équivalent au filtrage par masque"],
    ["Piège : après un filtrage, l'index n'est plus contigu","df**[df[\"col\"] > 0]**","les lignes gardent leur label d'origine — l'index devient un sous-ensemble discontinu (ex: 0,1,3,4,6...), ce n'est plus un RangeIndex propre même s'il ressemble à des entiers croissants ; .reset_index(drop=True) pour repartir sur un index propre"],
  ]},
  {id:"filtrage-pieges", group:"pandas", subgroup:"Sélection, filtrage & tri", title:"Filtrage — Piège", rows:[
    ["Cas sûr : lecture seule après filtrage, aucune modification prévue","sous_df = df[df[\"col\"] > 10]\nprint(sous_df.**describe**())","aucun risque : tu ne fais que lire, .copy() est inutile"],
    ["Cas sûr : modifier l'original en une seule étape","df.**loc**[df[\"col\"] > 10, \"autre_col\"] = 0","modification directe et sûre de df, aucune ambiguïté"],
    ["Piège : sélection puis modification en deux étapes, sans copie","sous_df = df[df[\"col\"] > 10].**copy**()\nsous_df[\"nouvelle_col\"] = 1","avec .copy() : sous_df devient un objet à part entière, le modifier ne touche jamais df\nsans .copy() : ambigu -> SettingWithCopyWarning, pandas ne sait pas si tu voulais modifier df ou créer un objet séparé","sous_df = df[df[\"col\"] > 10]\nsous_df[\"nouvelle_col\"] = 1"],
  ]},
  {id:"pandas-clip", group:"pandas", subgroup:"Sélection, filtrage & tri", title:"Series.clip — borner une colonne", rows:[

  {id:"nettoyage", group:"pandas", subgroup:"Transformation", title:"Nettoyage des données", rows:[

    ["Piège : filtrer les valeurs manquantes (NaN). NaN n'est jamais égal à lui-même en Python/numpy (même deux NaN comparés entre eux donnent False), donc comparer avec == ne peut jamais fonctionner pour les repérer — et pire, ça ne renvoie aucune erreur ni aucun warning, juste un résultat vide.","df[df[\"col\"].**isna**()]","lignes où col est NaN","df[df[\"col\"] == np.nan]"],
  ]},
  {id:"index-add-remove-rows", group:"pandas", subgroup:"Transformation", title:"Ajouter / enlever des lignes", rows:[
    ["Ajouter une ligne","pd.**concat**([df, pd.DataFrame([{\"col1\": val1, \"col2\": val2}])], ignore_index=True)","concat garde l'index d'origine de chaque morceau — la nouvelle ligne a par défaut un index qui recommence à 0, donc sans ignore_index=True elle peut dupliquer un label déjà présent dans df ; ignore_index=True régénère un RangeIndex propre pour tout le résultat"],
    ["Ajouter une ligne à un label précis","df.**loc**[len(df)] = [val1, val2]","ajoute une ligne au label len(df) — ne fonctionne proprement que si l'index est déjà un RangeIndex 0..n-1 sans trou, sinon le label choisi peut déjà exister"],
    ["Supprimer une ligne cible le label, pas la position","df.**drop**(1)","supprime la ligne dont le label d'index vaut 1 — si l'index n'est plus un RangeIndex propre (après un filtrage précédent), ça peut ne pas être la 2e ligne du DataFrame"],
    ["Supprimer une ligne par position (peu importe son label)","df.**drop**(df.index[1])","supprime la 2e ligne du DataFrame, quel que soit son label — équivalent positionnel de drop(1)"],
    ["Sélection par label vs par position","df.**loc**[1] / df.**iloc**[1]","loc cherche le label 1 dans l'index (peut échouer ou renvoyer plusieurs lignes si doublon) ; iloc prend toujours la 2e ligne, par position, indépendamment des labels"],
  ]},
  {id:"transformation", group:"pandas", subgroup:"Transformation", title:"Transformation de colonnes", rows:[
    ["Créer une colonne à partir de deux autres","df[\"**nouvelle**\"] = df[\"col1\"] + df[\"col2\"]","nouvelle colonne calculée"],

    ["Anti-pattern à reconnaître (et éviter) : boucler ligne par ligne","for index, row in df.**iterrows**():\n    ...","très lent sur un gros DataFrame — préférer une opération vectorisée (df[\"col\"] * 2), .apply(), ou du boolean indexing ; utile seulement pour reconnaître ce pattern dans du code existant, pas pour en écrire"],

  {id:"transformation-conditionnelle", group:"pandas", subgroup:"Transformation", title:"Transformation conditionnelle", rows:[

  {id:"groupby", group:"pandas", subgroup:"Agrégation", title:"Groupby / agrégation", rows:[
    ["Moyenne par groupe","df.groupby(\"col\").**mean**()","DataFrame indexé par groupe"],
    ["Somme d'une colonne par groupe","df.groupby(\"col\")[\"valeur\"].**sum**()","Series indexée par groupe"],
    ["Agrégations multiples nommées","df.groupby(\"col\").**agg**(total=(\"valeur\",\"sum\"), moyenne=(\"valeur\",\"mean\"))","DataFrame avec colonnes nommées"],
    ["Agrégations multiples, forme dict (équivalente, plus rapide à écrire)","df.groupby(\"col\").**agg**({\"valeur\": \"sum\", \"autre\": \"mean\"})","DataFrame — une colonne par clé du dict, nommée comme la colonne d'origine (pas de renommage possible contrairement à la forme nommée ci-dessus)"],
    ["Nombre de lignes par groupe(s)","df.groupby([\"col1\", \"col2\"]).**size**()","Series du nb de lignes (NaN inclus) — pour compter, c'est size(), pas count()"],
    ["Nombre de valeurs non-nulles par groupe, colonne par colonne","df.groupby(\"col\").**count**()","DataFrame du nb de valeurs non-NaN pour chaque colonne (peut différer de size() s'il y a des NaN)"],
  ]},
  {id:"pandas-groupby-index", group:"pandas", subgroup:"Agrégation", title:"Groupby : gérer l'index (to_frame, reset_index, reindex)", rows:[
    ["Nombre de lignes par groupe, en colonne directement nommée","df.groupby(\"order_id\").**size**().**to_frame**(\"number_of_items\").reset_index()","DataFrame à 2 colonnes [\"order_id\", \"number_of_items\"] : .size() (Series) -> .to_frame(nom) (nomme la colonne) -> .reset_index() (l'index de groupe redevient une colonne)"],
    ["Repasser en DataFrame \"plat\" après groupby","df.groupby(\"col\").mean().**reset_index**()","index de groupe redevenu colonne — même logique utilisée dans to_frame().reset_index() ci-dessus"],
    ["Combler les groupes absents avec une valeur par défaut","df.groupby(\"col\").size().**reindex**(liste_complete, fill_value=0)","recale la Series sur toutes les clés de liste_complete — les groupes manquants du groupby prennent 0 au lieu d'être absents"],
    ["Piège : reindex() droppe silencieusement ce qui n'est pas dans la nouvelle liste","serie.**reindex**(liste_complete)","toute clé présente dans serie mais absente de liste_complete disparaît sans avertissement — utile si liste_complete est bien exhaustive, dangereux sinon (incohérence de données, ex: order_id de reviews absent de orders)"],
  ]},
  {id:"fusion", group:"pandas", subgroup:"Jointures", title:"Fusion / jointures", rows:[
    ["Jointure sur une clé commune","**pd.merge**(df1, df2, on=\"cle\", how=\"inner\")","DataFrame fusionné (lignes communes)"],
    ["Jointure avec clés différentes","**pd.merge**(df1, df2, left_on=\"cle1\", right_on=\"cle2\", how=\"left\")","toutes les lignes de df1 + correspondances"],
    ["Empiler des lignes","**pd.concat**([df1, df2], axis=0)","DataFrame concaténé verticalement"],
    ["Ajouter des colonnes côte à côte","**pd.concat**([df1, df2], axis=1)","DataFrame concaténé horizontalement"],
    ["Piège : concaténer sans régénérer l'index → doublons","pd.**concat**([df1, df2])","chaque morceau garde son propre index d'origine : si df1 et df2 ont tous les deux un label 0, le résultat a deux lignes d'index 0 — utiliser ignore_index=True ou reset_index(drop=True) après pour éviter ça"],
    ["Forcer une erreur plutôt qu'un doublon silencieux","pd.**concat**([df1, df2], verify_integrity=True)","lève une erreur si le résultat contient des labels d'index dupliqués, au lieu de les laisser passer"],
  ]},
  {id:"pandas-anti-join", group:"pandas", subgroup:"Jointures", title:"Anti-jointure — repérer les lignes sans correspondance", rows:[
    ["Compter les order_id sans review, via une jointure outer","merged = orders[[\"order_id\"]].**merge**(reviews[[\"order_id\",\"review_id\"]], on=\"order_id\", how=\"outer\")\nmerged.**isna**().sum()[\"review_id\"]","nb de order_id qui n'ont trouvé aucune review — how=\"outer\" garde toutes les lignes des deux côtés ; un NaN dans review_id signifie \"pas de review pour cette commande\" (à comparer à l'approche isin()+~ de la section Filtrage, plus directe si on n'a pas besoin des colonnes de droite)"],
    ["Indicateur explicite de la provenance de chaque ligne après un merge","pd.merge(orders, reviews, on=\"order_id\", how=\"outer\", **indicator=True**)","ajoute une colonne _merge (\"left_only\" / \"right_only\" / \"both\") — utile pour diagnostiquer précisément quelles lignes ne matchent pas de chaque côté"],
  ]},
  {id:"scipy-stats", group:"stats", title:"Scipy.stats — lois continues & statistiques", headers:["Nom","Formule","Params","Explication"], colClasses:["col-nom","col-formule","col-params","col-explication"], rows:[
    ["Importer les fonctions utiles","from scipy.stats import **norm, skew, kurtosis**","-","-"],
    ["Asymétrie d'une distribution (skewness)","**skew**(array)","-","0 si symétrique, >0 asymétrie à droite, <0 à gauche"],
    ["Aplatissement d'une distribution (kurtosis)","**kurtosis**(array)","-","proche de 0 pour une gaussienne"],
    ["Créer une loi Normale N(µ,σ)","**norm**(mu, sigma)","$\\mu$ : moyenne\n$\\sigma$ : écart-type","objet distribution, réutilisable avec .pdf / .cdf"],
    ["Densité de probabilité (pdf) en un point x","norm(mu, sigma).**pdf**(x)","$x$ : point où évaluer la densité","float ou array — hauteur de la courbe"],
    ["Fonction de répartition (cdf)","$$F(x) = P(X \\le x)$$\nnorm(mu, sigma).**cdf**(x)","$x$ : valeur seuil\n$X \\sim \\mathcal{N}(\\mu,\\sigma)$","-"],
    ["Probabilité que X dépasse une valeur","$$P(X>v) = 1 - F(v)$$\n1 - norm(mu, sigma).**cdf**(valeur)","$v$ : valeur seuil\n$X \\sim \\mathcal{N}(\\mu,\\sigma)$","-"],
    ["cdf de la loi normale centrée réduite N(0,1), à partir d'un z-score","$$\\Phi(z) = P(Z \\le z)$$\nnorm.**cdf**(z)","$z$ : score-z\n$Z \\sim \\mathcal{N}(0,1)$","-"],
    ["Loi Binomiale(n,p) — raccourci scipy","from scipy.stats import binom\nbinom(n, p).**pmf**(k)","$n$ : nombre d'essais\n$p$ : probabilité de succès\n$k$ : nombre de succès recherché","équivalent scipy de la formule manuelle math.comb(n,k) * p**k * (1-p)**(n-k) (cf. section Maths ▸ Lois de probabilité discrètes) — même logique que norm(mu, sigma) ci-dessus, mais pour une loi discrète"],
  ]},
  {id:"ols-fit", group:"regression", title:"Régression linéaire multivariée (OLS) avec statsmodels", headers:["Nom","Formule / Syntaxe","Params","Explication"], colClasses:["col-nom","col-formule","col-params","col-explication"], rows:[
    ["Modèle de régression multivariée (OLS)","$$y = \\beta_0 + \\beta_1 x_1 + ... + \\beta_p x_p + \\epsilon$$\nimport statsmodels.formula.api as smf\nmodel = smf.**ols**(\"y ~ x1 + x2\", data=df).**fit**()","$y$ : variable cible (dépendante)\n$x_i$ : features (indépendantes)\n$\\beta_i$ : coefficients estimés — $\\beta_0$ est l'Intercept","OLS = Ordinary Least Squares, minimise la MSE (Mean Squared Error) entre prédictions et valeurs réelles ; la formule texte façon R décrit le modèle, .fit() calcule les coefficients"],
    ["Ce que produit .fit()","model.params\nmodel.**fittedvalues**\nmodel.resid\nmodel.**summary**()","params : Series des $\\beta_i$ estimés, indexée par nom de feature (+ Intercept) — une valeur par feature, pas par ligne\nfittedvalues : $\\hat y$, une valeur par ligne de df\nresid : $y - \\hat y$, une valeur par ligne","fit() renvoie un objet Results complet, pas juste les coefficients — model.fittedvalues donne directement ŷ (les prédictions sur les données d'entraînement, même échelle que y) ; à comparer avec Logit ci-dessous, où fittedvalues n'est PAS sur l'échelle de y"],
    ["Ajouter une variable catégorielle à la formule","model = smf.ols(\"y ~ x1 + **C(**cat_feature**)**\", data=df).fit()","cat_feature : colonne catégorielle (str)","C() crée une variable indicatrice (dummy 0/1) par catégorie — une modalité sert de référence (dans l'Intercept), les autres apparaissent en coefficients séparés"],
    ["Standardiser les features avant régression (rendre les coefficients comparables)","df_std = (df[features] - df[features].**mean**()) / df[features].**std**()","features : liste de colonnes numériques","transforme chaque feature en z-score (moyenne 0, écart-type 1, cf. Score-z) — sans ça, les coefficients ne sont pas comparables entre eux à cause des différences d'échelle des variables d'origine"],
    ["Ajuster un modèle via l'API bas niveau (tableaux plutôt que formule texte)","import statsmodels.api as sm\nmodel = sm.**OLS**(y, X).fit()","y : array/Series cible\nX : DataFrame/array des features","alternative à smf.ols(formula=...) — utile quand X/y sont déjà construits séparément ; contrairement à smf.ols, il faut ajouter l'intercept soi-même avec sm.add_constant(X) (sinon le modèle passe par l'origine)"],
    ["Supprimer l'intercept dans une formule (un coefficient par catégorie, sans référence)","model = smf.ols(\"y ~ C(cat_feature) **- 1**\", data=df).fit()","-","sans le -1, une modalité sert de référence (absorbée dans l'Intercept) et les autres coefficients représentent des écarts à cette référence ; avec -1, chaque modalité reçoit directement son propre coefficient, égal à sa moyenne"],
  ]},
  {id:"ols-summary", group:"regression", title:"Lire le résumé d'une régression (.summary())", headers:["Nom","Formule / Syntaxe","Params","Explication"], colClasses:["col-nom","col-formule","col-params","col-explication"], rows:[
    ["Afficher le résumé complet du modèle",[
      {code:"model.**summary**()"},
      {label:"→ extrait, valeurs fictives :"},
      {table:"                            OLS Regression Results\n==============================================================================\nDep. Variable:                      y   R-squared:                       0.712\nModel:                            OLS   Adj. R-squared:                  0.706\nMethod:                 Least Squares   F-statistic:                     121.4\n                                        Prob (F-statistic):           3.45e-28\nNo. Observations:                 200   Log-Likelihood:                -410.22\nDf Residuals:                     197   AIC:                             826.4\nDf Model:                            2   BIC:                             836.3\n==============================================================================\n                 coef    std err          t      P>|t|      [0.025      0.975]\n------------------------------------------------------------------------------\nIntercept      4.5678      0.512      8.921      0.000       3.559       5.577\nx1             2.3456      0.187     12.545      0.000       1.977       2.714\nx2            -1.2345      0.298     -4.142      0.000      -1.822      -0.647\n==============================================================================\nOmnibus:                        1.203   Durbin-Watson:                   1.987\nProb(Omnibus):                  0.548   Jarque-Bera (JB):                1.102\nSkew:                           0.145   Prob(JB):                        0.577\nKurtosis:                       2.891   Cond. No.                         12.4\n=============================================================================="}
    ],"-","tableau texte avec tous les indicateurs détaillés ci-dessous — R-squared / Adj. R-squared / F-statistic / Prob (F-statistic) en haut à droite ; coef/std err/t/P>|t| par feature dans le tableau du milieu ; Omnibus/JB/Skew/Kurtosis/Durbin-Watson/Cond. No. en bas"],
    ["Accès direct aux valeurs clés (sans repasser par .summary())","model.**rsquared**\nmodel.**resid**","-","rsquared : float ; resid : Series des résidus, équivalent à model.predict(df) - df[\"y\"] mais déjà calculé par statsmodels — formule du R² et pièges d'interprétation détaillés en section Maths ▸ Régression"],
    ["Condition pour que le R² soit interprétable","-","-","le R² n'a de sens que si le modèle contient un intercept (une colonne de 1 dans X) — smf.ols l'ajoute automatiquement, sm.OLS non (cf. sm.add_constant ci-dessus)"],
    ["Coefficient, erreur standard, t-value, p-value","**coef** / **std err** / **t** / **P>|t|**","coef : $\\beta_i$ estimé\nt = coef / std err","P>|t| < 0.05 (seuil usuel) ⇒ le coefficient est statistiquement significatif, on rejette $H_0: \\beta_i=0$ (cf. Test d'hypothèse, section Maths) — formule du std err en section Maths ▸ Régression"],
    ["Intervalle de confiance du coefficient","**[0.025   0.975]**","-","IC 95% de $\\beta_i$ — s'il ne contient pas 0, le coefficient est significatif (cohérent avec sa p-value)"],
    ["F-statistic / Prob (F-statistic)","-","-","teste si le modèle dans son ensemble est significatif (au moins un $\\beta_i \\ne 0$) — Prob(F-statistic) est la p-value associée, à regarder en premier avant les coefficients individuels"],
    ["Cond. No. (nombre de conditionnement)","-","-","élevé (ex: >30) ⇒ possible multicolinéarité (deux features très corrélées entre elles), rend les coefficients individuels instables à interpréter isolément — signal global sur l'ensemble du modèle, cf. VIF pour une détection feature par feature"],
    ["Omnibus / Jarque-Bera (JB) / Skew / Kurtosis / Durbin-Watson","-","-","diagnostics sur les résidus : Omnibus/JB testent leur normalité, Skew/Kurtosis leur forme, Durbin-Watson (≈2 si ok) détecte une autocorrélation — utiles pour valider les hypothèses de l'OLS, mais secondaires par rapport à R² et p-values"],
  ]},
  {id:"ols-diagnostics", group:"regression", title:"Prédictions, résidus, RMSE et coefficients significatifs", headers:["Nom","Formule / Syntaxe","Params","Explication"], colClasses:["col-nom","col-formule","col-params","col-explication"], rows:[
    ["Prédire à partir du modèle","y_pred = model.**predict**(df)","df : mêmes colonnes que celles utilisées pour fit()","applique les coefficients appris aux lignes de df"],
    ["Résidus","$$\\epsilon_i = \\hat y_i - y_i$$\n**residuals** = y_pred - df[\"y\"]","-","toujours vérifier que residuals.mean() ≈ 0 après un fit OLS — sinon, il y a une erreur dans le calcul ; diagnostics des résidus (hétéroscédasticité, autocorrélation) détaillés en section Maths ▸ Régression"],
    ["RMSE (Root Mean Squared Error)","$$RMSE = \\sqrt{\\dfrac{1}{n}\\sum_{i=1}^n (\\hat y_i - y_i)^2}$$\nrmse = pow((residuals ** 2).mean(), 0.5)","-","erreur moyenne de prédiction, dans la même unité que y — plus petit = mieux, mais dépend de l'échelle de y (contrairement au R², sans unité)"],
    ["Récupérer coefficients et p-values du modèle","model.**params**    # Series des coefficients (dont Intercept)\nmodel.**pvalues**   # Series des p-values associées","-","utile pour filtrer/trier les coefficients programmatiquement plutôt que lire .summary() à l'œil"],
    ["Ne garder que les coefficients statistiquement significatifs","p = model.pvalues.reset_index()\np.columns = [\"variable\",\"p_value\"]\nc = model.params.reset_index()\nc.columns = [\"variable\",\"coef\"]\np.**merge**(c, on=\"variable\").**query**(\"p_value<0.05\").sort_values(\"coef\")","-","pattern utilisé dans olist/utils.py::return_significative_coef — combine pvalues et params par jointure (cf. Fusion/jointures), puis filtre p<0.05"],
    ["Graphiques de régression partielle (une feature à la fois, effet des autres neutralisé)","import statsmodels.api as sm\nfig = plt.figure(figsize=(10,10))\nsm.graphics.**plot_partregress_grid**(model, fig=fig)","-","visualise, pour chaque feature, sa relation avec y une fois l'effet des autres features retiré — équivalent graphique des partial correlation coefficients (coefficients de la régression multivariée)"],
    ["Visualiser les résidus pour détecter hétéroscédasticité/autocorrélation","sns.**scatterplot**(x=y_pred, y=residuals)","-","scatter résidus vs. valeurs prédites — motifs à repérer et leur signification détaillés en section Maths ▸ Régression"],
  ]},
  {id:"vif", group:"regression", title:"Détecter la multicolinéarité (VIF)", headers:["Nom","Formule / Syntaxe","Params","Explication"], colClasses:["col-nom","col-formule","col-params","col-explication"], rows:[
    ["Variance Inflation Factor (VIF)","$$VIF(X_k) = \\dfrac{1}{1-R_k^2}$$\nfrom statsmodels.stats.outliers_influence import variance_inflation_factor as vif\n[**vif**(X_scaled.values, i) for i in range(X_scaled.shape[1])]","$R_k^2$ : R² obtenu en régressant $X_k$ sur toutes les autres features\nX_scaled : features standardisées (cf. Standardiser les features avant régression)","détecte la multicolinéarité multivariée (contrairement à la matrice de corrélation, limitée aux paires de variables) — règle empirique : VIF ≥ 10 signale une feature redondante avec les autres, candidate à retirer ou combiner ; s'applique aussi bien à une régression linéaire (OLS) que logistique"],
  ]},
  {id:"logit-fit", group:"regression", title:"Régression logistique avec statsmodels", headers:["Nom","Formule / Syntaxe","Params","Explication"], colClasses:["col-nom","col-formule","col-params","col-explication"], rows:[
    ["Modèle de régression logistique","$$\\hat p = \\dfrac{1}{1+e^{-(\\beta_0+\\beta_1 x_1+...+\\beta_p x_p)}}$$\nimport statsmodels.formula.api as smf\nmodel = smf.**logit**(\"y ~ x1 + x2\", data=df).fit()","$y$ : cible binaire (0/1)\n$\\hat p$ : probabilité prédite d'appartenir à la classe 1\nmême syntaxe formule que smf.ols : C() pour catégorielles, -1 pour retirer l'intercept","fit() maximise la log-vraisemblance par une méthode itérative, pas de solution fermée comme pour OLS (cf. section Maths ▸ Régression)"],
    ["Ce que produit .fit()","model.params\nmodel.**fittedvalues**\nmodel.**predict**(df)\nmodel.**summary**()","params : Series des $\\beta_i$ estimés, indexée par nom de feature (+ Intercept) — une valeur par feature, pas par ligne\nfittedvalues : le prédicteur linéaire Xβ (log-odds), une valeur par ligne — PAS une probabilité","piège : contrairement à OLS, model.fittedvalues n'est pas sur l'échelle de y ni une probabilité — c'est le log-odds brut, non borné ]-∞,+∞[ ; pour la probabilité (bornée 0-1), il faut model.predict(df) (cf. carte 'chaîne concrète' ci-dessous)"],
    ["Prédire une classe à partir d'une probabilité","y_pred = (model.**predict**(df) > 0.5).astype(int)","0.5 : seuil de décision par défaut","au-dessus du seuil → classe 1, en dessous → classe 0 ; le seuil peut être ajusté selon le coût respectif des faux positifs / faux négatifs (cf. Erreurs de Type I/II, section Maths)"],
    ["La chaîne concrète, une valeur PAR LIGNE : de Xβ à la probabilité","$$\\text{odds} = \\dfrac{p}{1-p} \\qquad \\text{logit}(p) = \\log(\\text{odds}) = X\\beta$$\nlogit_p = model.**fittedvalues**        # = X.β, log-odds brut du modèle\np       = model.**predict**(df)          # = sigmoïde(logit_p), la probabilité\nodds    = p / (1 - p)                # = repasse de p aux odds","logit_p, p, odds : trois Series de même longueur que df, un trio de valeurs par ligne — juste 3 façons d'exprimer la même chose","le modèle apprend une droite sur l'échelle logit (comme une régression linéaire classique) ; predict() applique la sigmoïde pour la ramener en probabilité (bornée 0-1, interprétable) ; repasser en odds est optionnel, seulement utile pour retrouver le lien direct avec les coefficients (ligne suivante)"],
    ["Interpréter un coefficient, une valeur PAR FEATURE : l'effet de βᵢ sur les odds","$$\\text{OR}_i = \\dfrac{\\text{odds}(x_i+1)}{\\text{odds}(x_i)} = e^{\\beta_i}$$\nimport numpy as np\nodds_ratios = np.**exp**(model.params)","$\\beta_i$ : coefficient de $x_i$ (model.params) — effet de +1 unité de $x_i$ sur logit(p), à additionner à Xβ ci-dessus","odds_ratios : Series indexée comme model.params (une valeur par feature + Intercept, pas par ligne) — OR_i (= exp(βᵢ)) est le rapport entre les odds à xᵢ+1 et les odds à xᵢ : le facteur multiplicatif sur les odds pour +1 unité de xᵢ, toutes les autres features fixées ; ex: odds_ratios[\"x1\"]=1.01 ⇒ +1% des odds ; <1 ⇒ effet négatif sur la probabilité de succès"],
  ]},
  {id:"logit-summary", group:"regression", title:"Lire le résumé d'une régression logistique (.summary())", headers:["Nom","Formule / Syntaxe","Params","Explication"], colClasses:["col-nom","col-formule","col-params","col-explication"], rows:[
    ["Afficher le résumé complet du modèle",[
      {code:"model.**summary**()"},
      {label:"→ extrait, valeurs fictives :"},
      {table:"                           Logit Regression Results\n==============================================================================\nDep. Variable:                      y   No. Observations:                  200\nModel:                          Logit   Df Residuals:                      197\nMethod:                           MLE   Df Model:                            2\n                                        Pseudo R-squ.:                  0.2130\n                                        Log-Likelihood:                -98.234\n                                        LL-Null:                       -124.79\n                                        LLR p-value:                 1.234e-12\n==============================================================================\n                 coef    std err          z      P>|z|      [0.025      0.975]\n------------------------------------------------------------------------------\nIntercept     -1.2345      0.321     -3.845      0.000      -1.864      -0.605\nx1             0.6789      0.145      4.682      0.000       0.395       0.963\nx2            -0.3456      0.198     -1.745      0.081      -0.734       0.043\n=============================================================================="}
    ],"-","tableau texte avec tous les indicateurs détaillés ci-dessous — Pseudo R-squ. / Log-Likelihood / LL-Null en haut à droite ; coef/std err/z/P>|z| par feature dans le tableau du bas (z au lieu de t, cf. ligne ci-dessous) — mêmes emplacements que pour OLS, avec z à la place de t"],
    ["z au lieu de t","-","-","contrairement à OLS, la variance d'une loi de Bernoulli est connue analytiquement (pas besoin de l'estimer par s) → test z plutôt que t, pas de degrés de liberté à choisir"],
    ["Log-Likelihood (LL) et Pseudo R²","$$\\text{Pseudo } R^2 = 1 - \\dfrac{LL(\\text{model})}{LL(\\text{null})}$$\nmodel.**llf**        # LL(model)\nmodel.**llnull**     # LL(null)\nmodel.**prsquared**  # Pseudo R²","LL(model) : log-vraisemblance du modèle ajusté\nLL(null) : log-vraisemblance du modèle sans aucune feature (intercept seul)","les 3 sont déjà calculés par statsmodels, pas besoin de les recalculer à la main — accessibles en attributs (llf/llnull/prsquared) ET affichés directement dans l'en-tête de model.summary() (\"Log-Likelihood\", \"LL-Null\", \"Pseudo R-squ.\") ; LL ∈ ]-∞,0], plus proche de 0 = meilleur fit (rôle analogue au SSR pour OLS) ; Pseudo R² ∈ [0,1] permet de comparer des modèles entre eux, mais est moins directement interprétable qu'un vrai R²"],
    ["Vérifier LL(null) en ajustant soi-même le modèle nul (intercept seul)","model_null = smf.**logit**(\"y ~ 1\", data=df).fit()\nmodel_null.**llf**  # == model.llnull","\"y ~ 1\" : formule sans aucune feature, juste l'intercept","optionnel : sert surtout à vérifier/comprendre d'où vient model.llnull (log-vraisemblance d'un modèle qui ne fait que prédire la fréquence moyenne de y) — la même syntaxe \"y ~ 1\" fonctionne avec smf.ols pour une régression linéaire"],
    ["Conditions d'inférence allégées vs OLS","-","-","pas besoin de résidus normaux ni de variance constante (homoscédasticité) comme pour OLS — la lecture des p-values et IC des coefficients reste la même"],
  ]},
  {id:"ml-workflow", group:"ml", subgroup:"Workflow", title:"Workflow Scikit-learn — de bout en bout (table des matières)", rows:[
    ["1. Choisir & importer le modèle","-","cf. Choix du modèle — convention Sklearn : jamais import sklearn seul, ni import * — on importe la classe précise depuis son module"],
    ["2. Explorer","-","cf. Explorer — vérifier NaN, doublons et équilibre des classes avant tout"],
    ["3. Nettoyer","-","cf. Doublons, Valeurs manquantes, Outliers"],
    ["4. Séparer train / test AVANT de fitter quoi que ce soit","-","cf. Train/test split, Data Leakage — le split doit précéder le fit du scaler/encoder, sinon data leakage"],
    ["5. Preprocessing — fit sur train, transform partout","-","cf. Feature Scaling, Encoding — jamais de .fit() sur X_test"],
    ["6. Valider le modèle par cross-validation (sur train)","-","cf. K-Fold Cross Validation — estime la performance avant de toucher au test set"],
    ["7. Entraîner puis évaluer sur le test set, jamais vu à l'entraînement","-","cf. Train/test split — métrique par défaut dépendante du modèle (R² pour LinearRegression, accuracy pour LogisticRegression) — à comparer au score de cross-validation de l'étape précédente"],
    ["8. Diagnostiquer l'écart cross-val vs test","-","cf. Bias/Variance — écart 0-5% normal, 5-10% limite, +10% overfitting"],
    ["9. Réentraîner sur TOUT le dataset une fois validé","-","cf. Prédictions — une fois le modèle validé (étapes 6-8), on jette le split et on réentraîne sur 100% des données disponibles"],
    ["10. Prédire sur une donnée nouvelle","-","cf. Prédictions — ne jamais oublier de réappliquer le même preprocessing (scaler déjà fit à l'étape 5, jamais refit) aux nouvelles données"],
  ]},
  {id:"ml-models-overview", group:"ml", subgroup:"Choix du modèle", title:"Modèles Sklearn vus — Régression vs Classification", headers:["Nom","Syntaxe","Métrique .score()","Explication"], colClasses:["col-nom","col-formule","col-params","col-explication"], rows:[
    ["LinearRegression — régression","from sklearn.linear_model import LinearRegression\nmodel = **LinearRegression**()","R²","target continue (ex: prix) — équivalent Sklearn de smf.ols, sans les p-values/IC (cf. section Régression pour l'inférence statistique)"],
    ["LogisticRegression — classification","from sklearn.linear_model import LogisticRegression\nmodel = **LogisticRegression**()","accuracy","malgré le nom « regression », c'est un modèle de CLASSIFICATION : target catégorielle (ex: churn oui/non) — prédit une probabilité puis une classe ; équivalent Sklearn de smf.logit (cf. logit-fit pour l'inférence statistique)"],
    ["Choisir régression vs classification","-","-","target continue → régression ; target catégorielle (classes discrètes) → classification — cf. Discretizing pour transformer l'une en l'autre"],
  ]},
  {id:"ml-model-attributes", group:"ml", subgroup:"Choix du modèle", title:"Travailler avec un estimator déjà choisi", rows:[
    ["Coefficients appris (régression linéaire)","model.**coef_**\nmodel.**intercept_**","pente(s) a et ordonnée à l'origine b — attributs suffixés _ par convention Sklearn (disponibles seulement après fit)"],
    ["Trouver les valeurs valides d'un paramètre (ex: strategy)","**SimpleImputer?**  # Jupyter : ouvre la docstring\n# ou Shift+Tab dans SimpleImputer(strategy=|)\n# ou provoquer l'erreur exprès :\nSimpleImputer(strategy=\"bogus\").fit([[1],[2]])","le message d'erreur liste les valeurs acceptées : \"... must be a str among {'most_frequent', 'constant', 'median', 'mean'}...\" — marche pour n'importe quel paramètre/classe Sklearn"],
  ]},
  {id:"ml-explore", group:"ml", subgroup:"Exploration & Nettoyage", title:"Explorer avant de modéliser", rows:[
    ["Vérifier NaN, doublons, équilibre des classes","df.**isnull**().sum()\ndf.**duplicated**().sum()\ndf['target'].**value_counts**()","cf. section Pandas ▸ Exploration pour les commandes générales (head, describe, dtypes...) — ici on regarde spécifiquement ce qui impacte un modèle ML"],
    ["Pourquoi ces 3 vérifications avant tout","-","NaN → un modèle Sklearn ne fit pas avec des NaN (sauf modèles spécifiques) ; doublons → faussent l'évaluation s'ils se répartissent entre train et test (cf. Data Leakage) ; classes déséquilibrées → le modèle apprend mal la classe minoritaire (cf. Balancing)"],
  ]},
  {id:"ml-duplicates", group:"ml", subgroup:"Exploration & Nettoyage", title:"Nettoyer — Doublons", rows:[
    ["Détecter / compter les doublons","df.**duplicated**()          # booléen par ligne\ndf.duplicated().**sum**()    # nombre de doublons","-"],
    ["Supprimer les doublons","df = df.**drop_duplicates**()","cf. Data Leakage : des lignes dupliquées présentes à la fois en train et en test faussent l'évaluation"],
  ]},
  {id:"ml-missing-data", group:"ml", subgroup:"Exploration & Nettoyage", title:"Nettoyer — Valeurs manquantes", rows:[
    ["Compter les NaN par colonne (nombre / %)","df.**isnull**().sum().sort_values(ascending=False)\ndf.**isnull**().sum() / len(df)   # en proportion","-"],
    ["Règle empirique pour décider quoi faire","-","> 30% de NaN → envisager de supprimer la feature (ou la ligne) ; < 30% → envisager une imputation adaptée au sens de la colonne"],
    ["⚠️ NaN ne veut pas toujours dire « donnée manquante »","-","ex: NaN sur une colonne Alley peut signifier « pas d'allée », pas une erreur de mesure — nécessite la connaissance métier du dataset"],
    ["Imputer avec SimpleImputer","from sklearn.impute import SimpleImputer\nimputer = SimpleImputer(strategy=\"mean\")\nimputer.**fit**(df[['col']])\ndf[['col']] = imputer.**transform**(df[['col']])\nimputer.**statistics_**","strategy : mean, median, most_frequent, constant — .fit() apprend la valeur de remplacement, .transform() l'applique (logique commune à tous les transformers Sklearn) — garder les doubles crochets df[['col']] des DEUX côtés (et pas df['col'] à gauche) marche pour toutes les colonnes, numériques ou catégorielles"],
    ["Piège (si jamais assigné en simple crochet df['col'])","df['col'] = imputer.transform(df[['col']]).**ravel**()  # ou .flatten()","transform() renvoie toujours un array **2D** (n,1) ; assigné à df['col'] (Series 1D), ça passe silencieusement sur une colonne numérique (pandas squeeze tout seul) mais lève une ValueError sur une colonne texte/objet (ex: most_frequent) — le plus simple est d'éviter le problème en assignant à df[['col']] (double crochets) plutôt que d'ajouter .ravel()"],
  ]},
  {id:"ml-outliers", group:"ml", subgroup:"Exploration & Nettoyage", title:"Nettoyer — Outliers", rows:[
    ["Visualiser les outliers","df[['col']].**boxplot**()\nsns.**boxplot**(data=df, x='col')","-"],
    ["Supprimer les valeurs clairement fausses","mask = (df['col'] > 0) & (df['col'] < 5000)\ndf = df[mask].**reset_index**(drop=True)","⚠️ un outlier n'est pas toujours une erreur — peut être une observation rare (novelty) ou une feature en soi ; à traiter au cas par cas"],
  ]},
  {id:"ml-scaling", group:"ml", subgroup:"Transformation", title:"Feature Scaling (Standard / MinMax / Robust)", headers:["Nom","Formule / Syntaxe","Params","Explication"], colClasses:["col-nom","col-formule","col-params","col-explication"], rows:[
    ["StandardScaler (standardiser)","$$z = \\dfrac{x - mean}{std}$$\nfrom sklearn.preprocessing import StandardScaler\nscaler = StandardScaler()\nscaler.**fit**(df[['col']])\ndf[['col']] = scaler.**transform**(df[['col']])","-","centre à 0 (μ=0) et réduit à écart-type 1 (σ=1) — sensible aux outliers ; bon choix par défaut pour la plupart des modèles (ex: régression linéaire, réseaux de neurones) — doubles crochets df[['col']] des deux côtés (cf. piège 2D/1D dans Valeurs manquantes)"],
    ["MinMaxScaler (normaliser)","$$X' = \\dfrac{X - X_{min}}{X_{max}-X_{min}}$$\nfrom sklearn.preprocessing import **MinMaxScaler**","-","compresse dans [0,1] — préserve la sparsité (0 reste 0), ne réduit pas l'effet des outliers — utile pour features positives/sparse (ex: pixels) ou pour KNN"],
    ["RobustScaler","$$RobustScaled = \\dfrac{x - median}{IQR}$$\nfrom sklearn.preprocessing import **RobustScaler**","IQR : écart interquartile Q3 − Q1","utilise médiane + IQR au lieu de moyenne + écart-type → moins sensible aux outliers que Standard/MinMax"],
    ["Fit sur train seulement, transform sur train ET test","scaler.**fit**(X_train)\nX_train = scaler.**transform**(X_train)\nX_test = scaler.**transform**(X_test)  # jamais de .fit() sur X_test","-","cf. Data Leakage — fitter un scaler sur tout le dataset (avant le split) fait fuiter de l'information du test set dans l'entraînement"],
    ["Réassigner plusieurs colonnes scalées d'un coup, par leur nom","X_train[cols] = scaler.transform(X_train[cols])\nX_train.columns  # ou : scaler.**get_feature_names_out**()","cols : liste de colonnes numériques","évite de retaper les noms de colonnes à la main quand on scale plusieurs features en une seule fois (contrairement à df[['col']] utilisé ci-dessus pour une seule colonne) — même pattern que pour OneHotEncoder (cf. Encoding)"],
  ]},
  {id:"ml-encoding", group:"ml", subgroup:"Transformation", title:"Encoding (variables catégorielles)", headers:["Nom","Syntaxe","Params","Explication"], colClasses:["col-nom","col-formule","col-params","col-explication"], rows:[
    ["OrdinalEncoder — catégories avec un ordre","from sklearn.preprocessing import OrdinalEncoder\nenc = OrdinalEncoder(categories=[['bad','average','good']])\nenc.**fit**(df[['col']])\nenc.**categories_**\ndf[['col_encoded']] = enc.**transform**(df[['col']])","categories : ordre explicite à préciser, sinon ordre alphabétique par défaut","à utiliser seulement si la variable a un vrai ordre — sinon crée une fausse relation numérique entre catégories"],
    ["OneHotEncoder — catégories sans ordre","from sklearn.preprocessing import OneHotEncoder\nohe = OneHotEncoder(sparse_output=False)\nohe.**fit**(df[['col']])\ndf[ohe.**get_feature_names_out**()] = ohe.**transform**(df[['col']])\ndf = df.**drop**(columns=['col'])","drop=\"if_binary\" : une seule colonne si la feature n'a que 2 catégories","crée une colonne binaire par catégorie — attention à la cardinalité (curse of dimensionality) sur les colonnes à beaucoup de catégories"],
    ["LabelEncoder — encoder la target (classification)","from sklearn.preprocessing import LabelEncoder\nle = LabelEncoder().fit(y)\ny_encoded = le.**transform**(y)\nle.**inverse_transform**(y_encoded)  # retour aux labels d'origine","-","souvent inutile : la plupart des modèles Sklearn gèrent une target texte directement — à réserver aux cas où l'encodage/décodage est explicitement nécessaire"],
  ]},
  {id:"ml-discretizing", group:"ml", subgroup:"Transformation", title:"Discretizing — pd.cut", rows:[
    ["Transformer une variable continue en catégories","df['col_bin'] = pd.**cut**(x=df['col'], bins=[min-1, mean, max+1], labels=['low','high'])","bins : n+1 bornes pour n labels — transforme une tâche de régression en tâche de classification (ex: prix → Low/High)"],
  ]},
  {id:"ml-balancing", group:"ml", subgroup:"Transformation", title:"Balancing (classes déséquilibrées)", rows:[
    ["Pourquoi équilibrer","-","une classe sous-représentée est mal apprise par le modèle — un split 70/30 est déjà considéré déséquilibré en classification binaire"],
    ["Stratégies","-","oversampling (dupliquer / générer la classe minoritaire) ou undersampling (sous-échantillonner la classe majoritaire)"],
    ["SMOTE (oversampling synthétique)","from imblearn.over_sampling import **SMOTE**  # pip install imbalanced-learn","génère de nouvelles observations minoritaires par combinaison linéaire d'observations existantes"],
    ["⚠️ Où appliquer le balancing","-","seulement sur le train set, après le split — jamais sur le test set qui doit rester représentatif du monde réel"],
  ]},
  {id:"ml-holdout", group:"ml", subgroup:"Test", title:"Train/test split — train_test_split (Holdout Method)", rows:[
    ["Séparer train / test","from sklearn.model_selection import train_test_split\nX_train, X_test, y_train, y_test = **train_test_split**(X, y, test_size=0.3, random_state=88)","~70/30 usuel — random_state fixe le tirage aléatoire pour la reproductibilité"],
    ["Piège : scorer un modèle sur ses données d'entraînement","model.fit(X_train, y_train)\nmodel.score(**X_test**, **y_test**)  # jamais X_train, y_train","sinon on mesure la mémorisation, pas la capacité à généraliser sur des données non vues"],
    ["Limites du Holdout","-","split aléatoire → score qui varie selon le tirage ; perte d'information (les données de test ne servent pas à l'entraînement), surtout gênant sur un petit dataset"],
  ]},
  {id:"ml-data-leakage", group:"ml", subgroup:"Test", title:"Train/test split — Data Leakage, piège transversal", rows:[
    ["Définition","-","information du test set (ou du futur) qui fuite dans l'entraînement, faussant l'évaluation à la hausse"],
    ["Sources fréquentes","-","doublons partagés entre train/test ; fit d'un scaler/encoder sur tout le dataset avant le split ; oversampling avant le split ; feature dérivée directement de la target (ex: une colonne prix_euros ≈ target convertie dans une autre unité)"],
    ["Règle générale","transformer.**fit**(X_train)  # jamais X_test ou X entier\nX_train = transformer.**transform**(X_train)\nX_test = transformer.**transform**(X_test)","toute transformation (scaler, encoder, imputer...) doit être fit uniquement sur le train set, puis appliquée (transform) identiquement au train et au test"],
  ]},
  {id:"ml-cross-validation", group:"ml", subgroup:"Test", title:"K-Fold Cross Validation", rows:[
    ["Valider sur K sous-échantillons","from sklearn.model_selection import cross_validate\ncv_results = **cross_validate**(model, X, y, cv=5)\ncv_results['test_score'].mean()","moyenne les scores sur K splits différents plutôt qu'un seul split — plus robuste qu'un simple train_test_split"],
    ["Choisir K","-","compromis fiabilité / temps de calcul — règle empirique : K=5 ou K=10"],
    ["⚠️ Ce que cross_validate ne fait pas","-","ne renvoie pas un modèle entraîné : elle ne fait que scorer un modèle hypothétique entraîné sur tout le dataset — pour obtenir un modèle utilisable, il faut ensuite le fit sur l'ensemble des données"],
    ["Variante : cross_val_score","from sklearn.model_selection import cross_val_score\n**cross_val_score**(model, X, y, cv=5, scoring=\"r2\").mean()","renvoie directement un array de scores (une seule métrique, via scoring) au lieu du dict de cross_validate (test_score, fit_time, ...) — pratique pour un score rapide sans les à-côtés"],
  ]},
  {id:"ml-bias-variance", group:"ml", subgroup:"Test", title:"Bias/Variance tradeoff & Learning Curves", rows:[
    ["Bias (underfitting)","-","le modèle est trop simple pour capter les patterns des données — scores train ET test bas"],
    ["Variance (overfitting)","-","le modèle capte le bruit en plus du signal — score train haut, score test bas"],
    ["No Free Lunch Theorem","-","aucun modèle n'est optimal pour tous les problèmes — le choix dépend des hypothèses faites sur les données"],
    ["Tracer les courbes d'apprentissage","from sklearn.model_selection import learning_curve\ntrain_sizes, train_scores, test_scores = **learning_curve**(estimator=model, X=X, y=y, train_sizes=[...], cv=5)\ntrain_scores.mean(axis=1)  # score moyen train par taille\ntest_scores.mean(axis=1)   # score moyen test par taille","évalue les scores train/test pour des tailles croissantes de training set — diagnostique underfitting / overfitting / besoin de plus de données"],
    ["Lecture des courbes","-","convergence + plateau haut = idéal ; convergence + plateau bas = underfitting (plus de données n'aidera pas) ; écart persistant train ≫ test = overfitting (plus de données peut aider)"],
    ["Repère chiffré : écart cross-val vs score sur le test set","cv_results['test_score'].**mean**()  # ex: 0.92, sur train\nmodel.**score**(X_test, y_test)        # ex: 1.0","règle empirique : écart de 0-5% = normal ; 5-10% = ok mais limite ; +10% = overfitting (le modèle a mémorisé le train plutôt que généralisé) — à ajuster selon le contexte, mais donne un premier seuil d'alerte rapide"],
  ]},
  {id:"ml-feature-selection", group:"ml", subgroup:"Test", title:"Feature selection — corrélation & permutation importance", rows:[
    ["Pourquoi sélectionner des features","-","garbage in → garbage out ; curse of dimensionality (plus de features nécessite exponentiellement plus de données pour généraliser) ; modèle plus simple = plus interprétable, plus rapide"],
    ["Repérer les features redondantes (corrélation univariée)","corr = df.select_dtypes('number').**corr**()\ncorr_df = corr.stack().reset_index()\ncorr_df.columns = ['f1','f2','correlation']","deux features très corrélées entre elles portent une information redondante — envisager d'en retirer une"],
    ["Piège : exclure la diagonale avant de trier","corr_df = corr_df[corr_df['f1'] **!= corr_df['f2']**]","chaque feature est corrélée à 1.0 avec elle-même — sans ce filtre, la diagonale (corrélation=1) noie le classement dès qu'on trie par force de corrélation"],
    ["Trier par force de corrélation","corr_df['abs_corr'] = corr_df['correlation'].**abs**()\ncorr_df.sort_values('abs_corr', ascending=False)","sans abs(), une corrélation négative forte (-0.9) passerait après une positive faible (0.5) — trie par force du lien, pas par signe"],
    ["Multicolinéarité multivariée","-","cf. VIF (Variance Inflation Factor), section Statsmodels & Régression — détecte les redondances qu'une simple matrice de corrélation (limitée aux paires) ne voit pas"],
    ["Feature Permutation Importance","from sklearn.inspection import permutation_importance\nmodel.fit(X, y)\nresult = **permutation_importance**(model, X, y, n_repeats=10)\nresult.importances_mean","n_repeats (nombre de mélanges aléatoires par feature) : mélange aléatoirement une feature et mesure la chute de score — grosse chute = feature importante, chute nulle/négative = feature peu utile"],
    ["Éliminer les features faibles et re-valider","weak = importance_df[importance_df['importance_mean'] <= 0]['feature']\nX_reduced = X.**drop**(columns=weak)\ncross_validate(model, X_reduced, y, cv=5)['test_score'].mean()","seuil ≤ 0 : une importance nulle/négative signifie que mélanger la feature n'a pas dégradé (voire a amélioré) le score — comparer au score de base pour vérifier qu'il ne chute pas significativement"],
  ]},
  {id:"ml-predictions", group:"ml", subgroup:"Prédictions", title:"Réentraînement final & prédiction sur nouvelle donnée", rows:[
    ["Pourquoi réentraîner sur tout le dataset","-","le split train/test (cf. Train/test split) et la cross-validation (cf. Test) ne servent qu'à ESTIMER la performance — une fois le modèle validé, on jette le split et on réentraîne sur 100% des données pour obtenir le modèle final le plus informé possible"],
    ["Réentraîner sur l'ensemble des données","model.**fit**(X, y)  # X, y = dataset complet, pas X_train/y_train","remplace le modèle entraîné sur X_train par un modèle entraîné sur toutes les données disponibles"],
    ["Prédire sur une donnée nouvelle","new_point_scaled = scaler.transform(new_point)\nmodel.**predict**(new_point_scaled)","ne jamais oublier de réappliquer le même preprocessing (scaler déjà fit pendant l'étape Test, jamais refit) aux nouvelles données avant de prédire"],
  ]},
  {id:"plot-base", group:"plot", title:"Matplotlib — graphiques de base", rows:[
    ["Importer matplotlib","import **matplotlib.pyplot** as plt","-"],
    ["Diagramme en barres","plt.**bar**(x, y)","graphique à barres"],
    ["Nuage de points","plt.**scatter**(x=x, y=y, label=\"...\", s=8)","nuage de points, s = taille des points"],
    ["Courbe / ligne","plt.**plot**(x, y, label=\"...\", color=\"red\")","courbe reliant les points"],
    ["Ligne horizontale constante (ex: valeur théorique)","plt.**plot**([valeur] * len(y), label=\"...\", color=\"red\")","ligne droite horizontale à hauteur 'valeur'"],
    ["Afficher le graphique","plt.**show**()","affiche la figure à l'écran"],
    ["Tracer directement depuis une Series/DataFrame (sans passer par plt.bar/scatter)","serie.**plot**(kind=\"barh\")","graphique en barres horizontales — pratique pour trier et visualiser des coefficients de régression (model.params.sort_values().plot(kind=\"barh\")) ou toute autre Series"],
  ]},
  {id:"plot-mise-en-forme", group:"plot", title:"Matplotlib — mise en forme", rows:[
    ["Définir la taille de la figure","plt.**figure**(figsize=(20, 10))","figure plus grande (largeur, hauteur en pouces)"],
    ["Titre du graphique","plt.**title**(\"mon titre\")","-"],
    ["Titre au-dessus de toute la figure (utile avec plt.subplot)","plt.**suptitle**(\"mon titre global\")","-"],
    ["Titres des axes","plt.**xlabel**(\"x\")\nplt.**ylabel**(\"y\")","-"],
    ["Limiter un axe pour masquer des outliers (un seul côté possible)","plt.**xlim**(right=70)\nplt.**ylim**(bottom=0)","tronque la vue sans modifier les données — right=/left=/top=/bottom= bornent un seul côté, l'autre reste automatique"],
    ["Afficher la légende (labels définis dans bar/scatter/plot)","plt.**legend**(loc=\"best\")","légende positionnée automatiquement"],
  ]},
  {id:"plot-quadrillage", group:"plot", title:"Matplotlib — quadrillage de sous-graphiques", rows:[
    ["Grille de sous-graphiques (lignes, colonnes, position)","plt.**subplot**(2, 2, 1)","sélectionne le 1er graphique d'une grille 2x2 — les plt.plot suivants s'y appliquent"],
    ["Créer une grille de sous-graphiques indépendants (objets Axes)","fig, axes = plt.**subplots**(nrows=2, ncols=3, figsize=(15, 10))\n# cas le plus courant, 2 côte à côte :\nfig, (ax1, ax2) = plt.**subplots**(1, 2, figsize=(12, 5))\nax1.bar(x, y)\nax2.scatter(x, y)","fig = la figure entière, axes = tableau 2D d'objets Axes (ou directement (ax1, ax2) si on dépaquette 1x2)\nfigsize=(largeur, hauteur) en pouces — ex: (12, 5) = plus large que haut, adapté à 2 graphiques côte à côte"],
    ["Parcourir tous les axes d'une grille","for ax in axes.**flat**:\n    ...","aplatit le tableau 2D d'axes en liste 1D pour boucler dessus"],
    ["Configurer un axe précis (titre, limites)","ax.**set_title**(f\"n={n}\")\nax.**set_xlim**(0, 40)","équivalent de plt.title / plt.xlim mais appliqué à un axe particulier de la grille"],
  ]},
  {id:"sns-usage", group:"plot", title:"Seaborn — jeux de données & distributions", rows:[
    ["Importer seaborn","import **seaborn** as sns","-"],
    ["Charger un dataset d'exemple intégré","tips_df = sns.**load_dataset**(\"tips\")","DataFrame (ex: dataset 'tips')"],
    ["Histogramme rapide, sans import supplémentaire","df.**hist**(\"col\", bins=20)","affiche directement un histogramme matplotlib — pratique en exploration rapide, mais rendu moins soigné que sns.histplot ci-dessous"],
    ["Histogramme (rendu plus soigné que plt.hist / df.hist)","sns.**histplot**(data, bins=20)","histogramme affiché directement"],
    ["Histogramme sur un axe précis, avec courbe de densité (KDE)","sns.histplot(data, bins=10, ax=ax, **kde=True**)","ax= dessine dans un sous-graphique particulier (utile avec plt.subplots), kde=True superpose une courbe de densité lissée"],
    ["Histogramme en densité, avec un pas discret (ex: notes entières, variable 0/1)","sns.**histplot**(df[\"col\"], kde=False, stat=\"density\", discrete=True)","stat=\"density\" normalise l'aire totale à 1 (comparable à une pdf, cf. section Maths) ; discrete=True centre une barre par valeur entière plutôt que des bins continus"],
    ["Superposer deux distributions pour les comparer (ex: valeurs réelles vs. prédites)","sns.**histplot**(y_true, label=\"actual\", kde=True)\nsns.**histplot**(y_pred, label=\"predicted\", kde=True)\nplt.legend()","deux histogrammes sur le même axe, avec légende — utile pour juger visuellement la qualité d'une régression"],
    ["Histogramme cumulatif (fonction de répartition empirique)","sns.**histplot**(df[\"col\"], binwidth=5, **cumulative=True**, stat=\"percent\")","cumulative=True cumule les effectifs bin par bin, stat=\"percent\" affiche des % plutôt que des comptes — version empirique/graphique de la cdf théorique (cf. Fonction de répartition, section Maths)"],
    ["Distributions côte à côte, une par catégorie","g = sns.**FacetGrid**(df, hue=\"dimension\", col=\"dimension\")\ng.map(sns.kdeplot, \"variable\")","une grille de courbes de densité (kde), une par valeur de dimension — pattern utilisé dans olist/utils.py::plot_kde_plot"],
    ["Compter les occurrences par catégorie","sns.**countplot**(data=df, x=\"categorie\", hue=\"autre_categorie\", stat=\"percent\")","diagramme en barres du nombre de lignes par modalité — hue= ajoute une sous-répartition par couleur, stat=\"percent\" affiche des % plutôt que des comptes bruts"],
  ]},
  {id:"sns-comparaison-cat", group:"plot", title:"Seaborn — comparer une distribution par catégorie", rows:[
    ["Nuage de points coloré par catégorie","sns.**scatterplot**(data=df, x=\"col1\", y=\"col2\", **hue**=\"categorie\")","un point par ligne, coloré selon la modalité de categorie — syntaxe de base à privilégier sur plt.scatter dès qu'il y a une dimension catégorielle à distinguer"],
    ["Boîte à moustaches (médiane, quartiles, outliers) par catégorie","sns.**boxplot**(data=df, x=\"categorie\", y=\"valeur\", hue=\"autre_categorie\")","une boîte par modalité de categorie — les moustaches représentent $[Q_1-1.5\\,IQR,\\ Q_3+1.5\\,IQR]$, les points au-delà sont les outliers (cf. Écart interquartile, section Maths)"],
    ["Violon (boxplot + densité KDE combinés)","sns.**violinplot**(data=df, x=\"categorie\", y=\"valeur\")","même info qu'un boxplot mais avec la forme de la distribution en plus (silhouette symétrique = densité kde de chaque côté)"],
    ["Nuage de points par catégorie (alternative au boxplot pour peu de données)","sns.**stripplot**(data=df, x=\"categorie\", y=\"valeur\")","affiche chaque observation individuelle plutôt qu'un résumé statistique — utile quand il y a peu de points, où un boxplot serait trompeur"],
  ]},
  {id:"sns-reg-corr", group:"plot", title:"Seaborn — régression et corrélation", rows:[
    ["Nuage de points + droite de régression + intervalle de confiance","sns.**regplot**(x=\"col1\", y=\"col2\", data=df, y_jitter=0.3, ci=95)","scatter + droite de régression linéaire, avec un cône ombré = intervalle de confiance (95% par défaut) — y_jitter ajoute du bruit vertical pour mieux voir la densité de points quand y est discret"],
    ["Matrice de corrélation entre toutes les colonnes numériques","df.**corr**(numeric_only=True)","DataFrame carré (n_cols x n_cols) des coefficients de corrélation de Pearson entre chaque paire de colonnes (cf. Corrélation de Pearson, section Maths)"],
    ["Visualiser la matrice de corrélation","sns.**heatmap**(df.corr(numeric_only=True), cmap=\"coolwarm\", annot=True)","grille colorée : rouge = corrélation positive forte, bleu = corrélation négative forte ; annot=True affiche les valeurs numériques dans chaque case"],
  ]},
  {id:"plotly-scatter", group:"plot", title:"Plotly Express — scatter interactif", rows:[
    ["Importer plotly express","import **plotly.express** as px","-"],
    ["Scatter interactif : position, taille et couleur encodent 4 variables à la fois","fig = px.**scatter**(data_frame=df, x=\"col1\", y=\"col2\", size=\"col3\", color=\"col4\", size_max=60, opacity=0.5)\nfig.**show**()","graphique interactif (zoom, survol pour voir les valeurs) — utile en exploration pour repérer des points ou groupes atypiques sans faire un scatter par paire de variables"],
    ["Courbe interactive (évolution dans le temps)","fig = px.**line**(df, x=\"annee\", y=\"valeur\", color=\"pays\")\nfig.show()","graphique le plus utilisé pour visualiser une série temporelle par catégorie (une courbe par valeur de color) — équivalent interactif de plt.plot / sns.lineplot"],
    ["Scatter enrichi : marges + droite de régression + label au survol","px.scatter(df, x=\"col1\", y=\"col2\", **marginal_x**=\"histogram\", **marginal_y**=\"box\", **trendline**=\"ols\", **hover_name**=\"pays\")","marginal_x/marginal_y ajoutent un histogramme/boxplot en marge de chaque axe, trendline=\"ols\" superpose une droite de régression, hover_name affiche un libellé personnalisé au survol plutôt que juste (x,y)"],
  ]},
  {id:"dash-app", group:"dash", title:"Dash — structure d'une app minimale", rows:[
    ["Installer Dash","**pip install dash dash-bootstrap-components**","-"],
    ["Structure minimale d'une app",[
      {code:"from dash import Dash, html, dcc\n\napp = **Dash**(__name__)\napp.**layout** = [html.H1(\"Titre\"), dcc.Graph(figure=fig)]\n\nif __name__ == \"__main__\":\n    app.**run**(debug=True)"}
    ],"lance un serveur local sur http://127.0.0.1:8050/ — debug=True recharge l'app automatiquement à chaque modification du fichier"],
    ["Deux familles de composants","dcc.**Graph**(...), dcc.**Dropdown**(...), dcc.**Slider**(...)   # Dash Core Components\nhtml.**H1**(...), html.**Div**(...), html.**P**(...)            # wrappers HTML","dcc = composants interactifs (graphiques, filtres) ; html = équivalents des balises HTML classiques — ensemble ils composent app.layout"],
    ["Appliquer un thème Bootstrap","import dash_bootstrap_components as dbc\napp = Dash(external_stylesheets=[dbc.**themes**.BOOTSTRAP])","applique un thème CSS prêt à l'emploi à toute l'app"],
    ["Grille responsive (12 colonnes)","dbc.**Row**([dbc.**Col**(comp1, width=8), dbc.**Col**(comp2, width=4)])","dispose des composants côte à côte, largeur en douzièmes de la ligne (8+4=12)"],
  ]},
  {id:"dash-callback", group:"dash", title:"Dash — interactivité (callbacks) & multi-pages", rows:[
    ["Callback : relier un composant d'entrée à une sortie",[
      {code:"**@callback**(\n    Output(\"mon_graph\", \"figure\"),\n    Input(\"mon_dropdown\", \"value\")\n)\ndef update(valeur):\n    filtered = df[df[\"country\"] == valeur]\n    return px.line(filtered, x=\"year\", y=\"co2\", title=f\"CO2 — {valeur}\")"}
    ],"la fonction décorée se réexécute automatiquement à chaque changement de la valeur du composant Input, et met à jour le composant Output (ici la figure du graphique)"],
    ["Identifier les composants à relier","dcc.Dropdown(**id=\"mon_dropdown\"**, options=[...])\ndcc.Graph(**id=\"mon_graph\"**)","id= sert de clé pour cibler le composant depuis Output()/Input() dans un callback"],
